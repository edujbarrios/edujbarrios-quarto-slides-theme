name: Render example

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render example deck
        run: quarto render example.qmd
